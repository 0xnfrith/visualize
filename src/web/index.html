<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>visualize</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .tldraw__editor {
        position: absolute;
        inset: 0;
      }
      /* Inlined diagram SVGs scale to fill their tldraw shape; the viewBox
         on the SVG handles the math. Without this the SVG's intrinsic
         width/height attributes would lock its rendered size. */
      .visualize-svg-host,
      .visualize-svg-host > svg {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
